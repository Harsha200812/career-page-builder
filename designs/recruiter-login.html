<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RecruitFlow | Celestial Dawn Access</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
        :root {
            --celestial-dawn: #f8fafc;
            --sky-blue: #e0f2fe;
            --pale-lavender: #f5f3ff;
            --primary-accent: #0047AB;
            --text-main: #0f172a;
            --text-muted: #475569;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--celestial-dawn);
            color: var(--text-main);
        }
        .font-headline {
            font-family: 'Manrope', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .glass-panel-floating {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .organic-blob {
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            filter: blur(120px);
            opacity: 0.6;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#0047AB",
                "surface": "#f8fafc",
                "on-surface": "#0f172a",
                "on-surface-variant": "#475569",
                "outline": "#94a3b8",
              },
              fontFamily: {
                "headline": ["Manrope"],
                "body": ["Inter"],
              },
              borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem", "2xl": "1rem", "3xl": "1.5rem"},

          },
        }
    </script>
</head>
<body class="min-h-screen w-full relative overflow-hidden flex items-center justify-center">

<div class="absolute bottom-[-10%] right-[-10%] w-[70vw] h-[70vw] organic-blob bg-[#f5f3ff]"></div>

<section class="hidden lg:flex flex-col w-1/3 space-y-8">
<div class="mb-4">
<span class="text-3xl font-black tracking-tighter text-on-surface font-headline">RecruitFlow</span>
</div>
<div class="glass-panel-floating rounded-[2rem] p-1 overflow-hidden shadow-xl shadow-blue-100/20">

<div class="absolute inset-0 bg-gradient-to-t from-white/90 via-white/10 to-transparent"></div>
<div class="absolute bottom-0 left-0 right-0 p-8">
<div class="flex gap-0.5 mb-3">
<span class="material-symbols-outlined text-amber-500 text-sm" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-amber-500 text-sm" style="font-variation-settings: 'FILL' 1;">star</span>

<blockquote class="text-on-surface text-sm font-semibold leading-relaxed italic mb-3">

<p class="text-xs font-bold text-primary uppercase tracking-widest">Azure Meridian</p>
</div>
</div>
</div>

</div>

<p class="text-on-surface-variant font-body">Access the talent pool universe.</p>

<form class="space-y-5">
<div class="space-y-2">
<label class="text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant px-1" for="email">Recruiter Identity</label>
<input class="w-full px-5 py-4 rounded-2xl bg-white border border-slate-200 focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all text-on-surface placeholder:text-slate-400" id="email" placeholder="email@company.com" type="email"/>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant" for="password">Security Key</label>
<a class="text-[10px] font-bold text-primary hover:text-blue-700 uppercase tracking-wider transition-colors" href="#">Reset</a>
</div>
<input class="w-full px-5 py-4 rounded-2xl bg-white border border-slate-200 focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all text-on-surface placeholder:text-slate-400" id="password" placeholder="••••••••" type="password"/>
</div>
<button class="w-full py-4 px-6 bg-primary hover:bg-blue-700 text-white font-bold rounded-2xl shadow-xl shadow-primary/20 transition-all duration-300 transform hover:-translate-y-0.5 active:translate-y-0" type="submit">
                        Enter Workspace
                    </button>
</form>
<div class="relative flex items-center py-8">
<div class="flex-grow border-t border-slate-200"></div>
<span class="flex-shrink mx-4 text-[10px] font-black text-outline uppercase tracking-[0.3em]">Universal Access</span>
<div class="flex-grow border-t border-slate-200"></div>
</div>
<button class="w-full flex items-center justify-center gap-3 py-4 px-6 bg-white border border-slate-200 text-on-surface font-semibold rounded-2xl hover:bg-slate-50 transition-all group">

<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>

<p class="mt-10 text-center text-sm font-medium text-on-surface-variant">
                    New to the mission?

</p>
</div>
<div class="mt-8 flex justify-center gap-6 opacity-60 hover:opacity-100 transition-opacity">
<a class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest hover:text-primary" href="#">Privacy</a>
<a class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest hover:text-primary" href="#">Terms</a>
<a class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest hover:text-primary" href="#">Help</a>
</div>
</section>
